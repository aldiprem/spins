<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SpinGiveaway - Giveaway Manager</title>
    <link rel="stylesheet" href="/spin/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Navigation Bar untuk 3 Page -->
    <nav class="bottom-nav">
        <div class="nav-item-gw active" data-page="giveaways">
            <i class="fas fa-gift"></i>
            <span>Giveaways</span>
        </div>
        <div class="nav-item-gw" data-page="activity">
            <i class="fas fa-history"></i>
            <span>Activity</span>
        </div>
        <div class="nav-item-gw" data-page="profile">
            <i class="fas fa-user-circle"></i>
            <span>Profil</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content-gw" id="mainContent">
        <!-- Content will be loaded here -->
        <div class="loading-screen">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading...</p>
        </div>
    </main>

    <script src="/spin/js/giveaway.js"></script>
</body>
</html>
